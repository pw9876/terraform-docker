name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: terraform-docker
  TERRAFORM_VERSION: "1.10.5"

jobs:
  security:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC token exchange with GitGuardian
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_OIDC_TOKEN: ${{ github.token }}   # OIDC — no stored API key needed

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC token exchange with SonarCloud
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SONAR_TOKEN is a GitHub repo secret — not committed to code.
          # Can be removed once OIDC is enabled in your SonarCloud organisation settings.

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          build-args: TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install container-structure-test
        run: |
          curl -fsSL https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64 \
            -o /usr/local/bin/container-structure-test
          chmod +x /usr/local/bin/container-structure-test

      - name: Run container structure tests
        run: |
          container-structure-test test \
            --image ${{ env.IMAGE_NAME }}:test \
            --config tests/container_structure_test.yaml

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [security, quality, build-and-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ env.TERRAFORM_VERSION }}
          build-args: TERRAFORM_VERSION=${{ env.TERRAFORM_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
